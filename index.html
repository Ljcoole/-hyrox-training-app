  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #1D9E75; --teal-l: #E1F5EE; --teal-t: #085041; --teal-a: #9FE1CB;
      --blue: #378ADD; --blue-l: #E6F1FB; --blue-t: #0C447C; --blue-a: #B5D4F4;

      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
      --radius: 10px; --radius-lg: 14px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

      :root {
        --bg: #141413; --bg2: #1e1e1c; --bg3: #252523;
        --text: #f0efe8; --text2: #9b9b95; --text3: #6b6b65;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);

        --blue-l: #0a1e35; --blue-t: #B5D4F4; --blue-a: #0f2d50;
        --amber-l: #2a1d06; --amber-t: #FAC775; --amber-a: #3d2a08;
        --pink-l: #280d1a; --pink-t: #F4C0D1; --pink-a: #3a1225;

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    #root { height: 100%; }
    input, textarea, button, select { font-family: inherit; }
    button { cursor: pointer; }
    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; }
    ::-webkit-scrollbar { width: 0; }
    .safe-top { padding-top: var(--safe-top); }
  </style>
</head>

};

const PAIN_LABELS = ["None","Mild","Moderate","High"];

const PAIN_BG     = ["var(--teal-l)","var(--amber-l)","#FAECE7","var(--red-l)"];

// Parse default set count from exercise string e.g. "Bench - 2x6-8" => 2
function parseSetCount(ex) {
  const m = ex.match(/(\d+)x/);
  return m ? Math.min(parseInt(m[1]), 6) : 2;
}

function pDate(s){ const [y,m,d]=s.split("-"); return new Date(+y,+m-1,+d); }
function dKey(d){ return d.toISOString().split("T")[0]; }
function fmt(d,opts){ return d.toLocaleDateString("en-US",opts); }
function fmtFull(d){ return fmt(d,{weekday:"short",month:"short",day:"numeric",year:"numeric"}); }
function fmtShort(d){ return fmt(d,{month:"short",day:"numeric"}); }
function getPhase(ds,phases){ return phases.find(p=>ds>=p.start&&ds<=p.end)||null; }
function getWorkout(ph,ds){
  if(!ph)return null;
  const m={1:"MON",2:"TUE",3:"WED",4:"THU",5:"FRI",6:"SAT",0:"SUN"};
  return ph.days.find(x=>x.day===m[pDate(ds).getDay()])||null;
}
function getWeek(ds){ return Math.floor((pDate(ds)-pDate("2026-03-23"))/(7*864e5))+1; }
function todayKey(){ return dKey(new Date()); }
function clamp(ds){ if(ds<"2026-03-23")return "2026-03-23"; if(ds>"2027-01-25")return "2027-01-25"; return ds; }
function addDays(ds,n){ const d=pDate(ds); d.setDate(d.getDate()+n); return clamp(dKey(d)); }

// Storage keys are profile-scoped
function sk(profile, key){ return `hyrox_${profile}_${key}`; }
function loadLS(key,fb){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):fb; }catch(_){ return fb; } }
function saveLS(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch(_){} }

function IntensityBadge({intensity}){
  const i=INTENSITY[intensity||"green"];
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,background:i.bg,color:i.text,border:`1px solid ${i.border}`}}>
      {i.dot} {i.label} <span style={{fontWeight:400,opacity:0.8}}>· {i.sub}</span>
    </span>
  );
}

function Card({children,style={}}){
  return <div style={{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden",...style}}>{children}</div>;
}
function CardHeader({label,bg,borderColor,textColor}){

    <div style={{padding:"10px 16px",background:bg||"var(--bg2)",borderBottom:`1px solid ${borderColor||"var(--border)"}`,display:"flex",alignItems:"center"}}>
      <span style={{fontSize:13,fontWeight:600,color:textColor||"var(--text)"}}>{label}</span>
    </div>
  );
}

// Per-set tracker for a single exercise
function SetTracker({ex, i, setData, isRun, phase, onChange}){
  const col = COLORS[phase.c];
  const sets = setData || [];
  const defaultCount = parseSetCount(ex);

  // Ensure we always show at least defaultCount sets
  const displaySets = sets.length > 0 ? sets : Array(defaultCount).fill({});

  function updateSet(setIdx, field, val){
    const next = [...displaySets];
    next[setIdx] = {...(next[setIdx]||{}), [field]: val};
    onChange(next);
  }
  function addSet(){
    onChange([...displaySets, {}]);
  }
  function removeSet(setIdx){
    if(displaySets.length <= 1) return;
    onChange(displaySets.filter((_,idx)=>idx!==setIdx));
  }

  return (
    <div style={{padding:"10px 16px",borderBottom:"0.5px solid var(--border)"}}>
      <div style={{fontSize:13,fontWeight:500,color:"var(--text2)",marginBottom:8}}>{ex}</div>
      {displaySets.map((s,si)=>(
        <div key={si} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
          <span style={{fontSize:11,fontWeight:600,color:col.t,background:col.l,border:`1px solid ${col.a}`,borderRadius:6,padding:"3px 7px",minWidth:42,textAlign:"center",flexShrink:0}}>
            Set {si+1}
          </span>
          {isRun ? <>
            <input placeholder="Dist" value={s.distance||""} onChange={e=>updateSet(si,"distance",e.target.value)}
              style={{flex:1,fontSize:12,padding:"5px 8px",borderRadius:8,border:`1px solid ${col.a}`,background:col.l,color:col.t}} />
            <input placeholder="Time" value={s.time||""} onChange={e=>updateSet(si,"time",e.target.value)}
              style={{flex:1,fontSize:12,padding:"5px 8px",borderRadius:8,border:`1px solid ${col.a}`,background:col.l,color:col.t}} />
          </> : <>
            <input placeholder="Weight" value={s.weight||""} onChange={e=>updateSet(si,"weight",e.target.value)}
              style={{flex:1,fontSize:12,padding:"5px 8px",borderRadius:8,border:`1px solid ${col.a}`,background:col.l,color:col.t}} />
            <input placeholder="Reps" value={s.reps||""} onChange={e=>updateSet(si,"reps",e.target.value)}
              style={{flex:1,fontSize:12,padding:"5px 8px",borderRadius:8,border:`1px solid ${col.a}`,background:col.l,color:col.t}} />
          </>}
          <button onClick={()=>removeSet(si)}
            style={{width:26,height:26,fontSize:14,lineHeight:1,borderRadius:6,border:"1px solid var(--border2)",background:"var(--bg2)",color:"var(--text3)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            −
          </button>
        </div>
      ))}
      <button onClick={addSet} style={{fontSize:12,padding:"4px 12px",borderRadius:8,border:`1px dashed ${col.main}`,background:"transparent",color:col.main,marginTop:2}}>
        + Add set
      </button>
    </div>
  );
}

function EditModal({phase,workout,onClose,onSave}){
  const [day,setDay]=useState(()=>JSON.parse(JSON.stringify(workout)));
  const col=COLORS[phase.c];
  function addEx(){ setDay({...day,exercises:[...day.exercises,""]}); }
  function removeEx(i){ setDay({...day,exercises:day.exercises.filter((_,idx)=>idx!==i)}); }
  function updateEx(i,v){ const e=[...day.exercises]; e[i]=v; setDay({...day,exercises:e}); }
  function moveEx(i,dir){
    const e=[...day.exercises],j=i+dir;
    if(j<0||j>=e.length)return;
    [e[i],e[j]]=[e[j],e[i]];
    setDay({...day,exercises:e});
  }
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"flex-end"}}
      onClick={e=>{ if(e.target===e.currentTarget)onClose(); }}>
      <div style={{background:"var(--bg)",borderRadius:"18px 18px 0 0",width:"100%",maxHeight:"88vh",overflowY:"auto",paddingBottom:"calc(24px + var(--safe-bottom))"}}>
        <div style={{position:"sticky",top:0,background:"var(--bg)",borderBottom:"0.5px solid var(--border)",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:1}}>
          <span style={{fontSize:16,fontWeight:600}}>Edit workout</span>
          <button onClick={onClose} style={{background:"var(--bg2)",border:"none",borderRadius:"50%",width:30,height:30,fontSize:18,lineHeight:"30px",color:"var(--text2)"}}>x</button>
        </div>
        <div style={{padding:"16px"}}>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:"var(--text2)",display:"block",marginBottom:5}}>Workout name</label>
            <input value={day.label} onChange={e=>setDay({...day,label:e.target.value})}
              style={{width:"100%",fontSize:15,padding:"9px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border2)",background:"var(--bg2)",color:"var(--text)"}} />
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:"var(--text2)",display:"block",marginBottom:7}}>Intensity</label>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(INTENSITY).map(([k,v])=>(
                <button key={k} onClick={()=>setDay({...day,intensity:k})}
                  style={{flex:1,padding:"8px 4px",fontSize:12,borderRadius:"var(--radius)",border:day.intensity===k?`2px solid ${v.border}`:"1px solid var(--border)",background:day.intensity===k?v.bg:"var(--bg2)",color:day.intensity===k?v.text:"var(--text2)",fontWeight:day.intensity===k?600:400}}>
                  {v.dot} {v.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:12,color:"var(--text2)",display:"block",marginBottom:7}}>Icon</label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {DAY_ICONS.map(ic=>(
                <button key={ic} onClick={()=>setDay({...day,icon:ic})}
                  style={{width:42,height:42,fontSize:20,borderRadius:"var(--radius)",border:day.icon===ic?`2px solid ${col.main}`:"1px solid var(--border)",background:day.icon===ic?col.l:"var(--bg2)"}}>
                  {ic}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:12,color:"var(--text2)",display:"block",marginBottom:7}}>Exercises</label>
            {day.exercises.map((ex,i)=>(
              <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  <button onClick={()=>moveEx(i,-1)} style={{width:24,height:20,fontSize:9,border:"1px solid var(--border)",borderRadius:4,background:"var(--bg2)",color:"var(--text2)"}}>▲</button>
                  <button onClick={()=>moveEx(i,1)}  style={{width:24,height:20,fontSize:9,border:"1px solid var(--border)",borderRadius:4,background:"var(--bg2)",color:"var(--text2)"}}>▼</button>
                </div>
                <input value={ex} onChange={e=>updateEx(i,e.target.value)} placeholder="e.g. Bench Press - 3x8"
                  style={{flex:1,fontSize:14,padding:"8px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border2)",background:"var(--bg2)",color:"var(--text)"}} />
                <button onClick={()=>removeEx(i)}
                  style={{width:34,height:34,fontSize:18,lineHeight:1,borderRadius:"var(--radius)",border:"1px solid var(--red-a)",background:"var(--red-l)",color:"var(--red-t)",flexShrink:0}}>x</button>
              </div>
            ))}
            <button onClick={addEx} style={{width:"100%",padding:"10px",fontSize:14,fontWeight:500,borderRadius:"var(--radius)",border:`1.5px dashed ${col.main}`,background:col.l,color:col.main}}>+ Add exercise</button>
          </div>
          <div style={{display:"flex",gap:10,paddingBottom:8}}>
            <button onClick={onClose} style={{flex:1,padding:"12px",fontSize:14,borderRadius:"var(--radius-lg)",border:"1px solid var(--border2)",background:"var(--bg2)",color:"var(--text2)"}}>Cancel</button>
            <button onClick={()=>onSave(day)} style={{flex:2,padding:"12px",fontSize:15,fontWeight:600,borderRadius:"var(--radius-lg)",border:"none",background:col.main,color:"#fff"}}>Save changes</button>
          </div>
        </div>
      </div>
    </div>
  );
}

const PROFILE_EMOJIS = ["💪","🏃","🔥","⚡","🎯","🏅","🦵","😤","🧠","👊","🥇","🏋️","🧗","🚴","🤸","🏊"];

function AvatarDisplay({avatar, size=40}){
  // avatar is either an emoji string or a base64 data URL
  const isPhoto = avatar && avatar.startsWith("data:");
  if(isPhoto){
    return <img src={avatar} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:"1.5px solid var(--border2)",flexShrink:0}} />;
  }
  return (
    <div style={{width:size,height:size,borderRadius:"50%",border:"1.5px solid var(--border2)",background:"var(--bg)",fontSize:size*0.5,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
      {avatar||"👤"}
    </div>
  );
}

function ProfileModal({profiles, current, onSelect, onAdd, onRename, onChangeAvatar, profileAvatars, onClose}){
  const [newName, setNewName] = useState("");
  const [editingProfile, setEditingProfile] = useState(null);
  const [editName, setEditName] = useState("");
  const [pickingAvatar, setPickingAvatar] = useState(null);
  const [customEmoji, setCustomEmoji] = useState("");

  function startEdit(p){ setEditingProfile(p); setEditName(p); setPickingAvatar(null); }
  function saveEdit(){ if(editName.trim() && editName.trim()!==editingProfile){ onRename(editingProfile, editName.trim()); } setEditingProfile(null); }

  function handlePhotoUpload(p, e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => { onChangeAvatar(p, ev.target.result); setPickingAvatar(null); };
    reader.readAsDataURL(file);
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end"}}
      onClick={e=>{ if(e.target===e.currentTarget){ setEditingProfile(null); setPickingAvatar(null); onClose(); } }}>
      <div style={{background:"var(--bg)",borderRadius:"18px 18px 0 0",width:"100%",maxHeight:"88vh",overflowY:"auto",paddingBottom:"calc(24px + var(--safe-bottom))"}}>
        <div style={{position:"sticky",top:0,background:"var(--bg)",borderBottom:"0.5px solid var(--border)",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:1}}>
          <span style={{fontSize:16,fontWeight:600}}>Profiles</span>
          <button onClick={onClose} style={{background:"var(--bg2)",border:"none",borderRadius:"50%",width:30,height:30,fontSize:18,lineHeight:"30px",color:"var(--text2)"}}>x</button>
        </div>
        <div style={{padding:"12px 16px"}}>
          {profiles.map(p=>{
            const avatar = profileAvatars[p] || "👤";
            const isActive = p === current;
            const isEditing = editingProfile === p;
            const isPicking = pickingAvatar === p;
            return (
              <div key={p} style={{marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:isPicking?"var(--radius-lg) var(--radius-lg) 0 0":"var(--radius-lg)",border:isActive?"2px solid #1D9E75":"1px solid var(--border2)",background:isActive?"var(--teal-l)":"var(--bg2)"}}>
                  {/* Avatar — tap to change */}
                  <button onClick={()=>{ setPickingAvatar(isPicking?null:p); setEditingProfile(null); }} style={{background:"none",border:"none",padding:0,cursor:"pointer",flexShrink:0}}>
                    <AvatarDisplay avatar={avatar} size={44} />
                  </button>
                  {isEditing ? (
                    <input value={editName} onChange={e=>setEditName(e.target.value)} autoFocus
                      onKeyDown={e=>{ if(e.key==="Enter")saveEdit(); if(e.key==="Escape")setEditingProfile(null); }}
                      style={{flex:1,fontSize:15,padding:"6px 10px",borderRadius:"var(--radius)",border:"1.5px solid #1D9E75",background:"var(--bg)",color:"var(--text)"}} />
                  ) : (
                    <span onClick={()=>{ onSelect(p); onClose(); }} style={{flex:1,fontSize:15,fontWeight:isActive?600:400,color:isActive?"var(--teal-t)":"var(--text)",cursor:"pointer"}}>{p}</span>
                  )}
                  {isEditing ? (
                    <button onClick={saveEdit} style={{padding:"6px 12px",fontSize:13,fontWeight:600,borderRadius:"var(--radius)",border:"none",background:"#1D9E75",color:"#fff",flexShrink:0}}>Save</button>
                  ) : (
                    <button onClick={()=>startEdit(p)} style={{padding:"6px 12px",fontSize:12,borderRadius:"var(--radius)",border:"1px solid var(--border2)",background:"transparent",color:"var(--text2)",flexShrink:0}}>Rename</button>
                  )}
                </div>

                {/* Avatar picker panel */}
                {isPicking && (
                  <div style={{background:"var(--bg2)",borderRadius:"0 0 var(--radius-lg) var(--radius-lg)",border:"1px solid var(--border2)",borderTop:"none",padding:"12px 14px"}}>
                    {/* Preset emojis */}
                    <div style={{fontSize:11,color:"var(--text3)",marginBottom:7,fontWeight:500}}>Pick an emoji</div>
                    <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:12}}>
                      {PROFILE_EMOJIS.map(ic=>(
                        <button key={ic} onClick={()=>{ onChangeAvatar(p,ic); setPickingAvatar(null); }}
                          style={{width:38,height:38,fontSize:20,borderRadius:"var(--radius)",border:avatar===ic?"2px solid #1D9E75":"1px solid var(--border)",background:avatar===ic?"var(--teal-l)":"var(--bg)",cursor:"pointer"}}>
                          {ic}
                        </button>
                      ))}
                    </div>
                    {/* Custom emoji input */}
                    <div style={{fontSize:11,color:"var(--text3)",marginBottom:7,fontWeight:500}}>Or type any emoji</div>
                    <div style={{display:"flex",gap:8,marginBottom:14}}>
                      <input value={customEmoji} onChange={e=>setCustomEmoji(e.target.value)}
                        placeholder="Type emoji from keyboard..."
                        style={{flex:1,fontSize:20,padding:"6px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border2)",background:"var(--bg)",color:"var(--text)"}} />
                      <button onClick={()=>{ if(customEmoji.trim()){ onChangeAvatar(p,customEmoji.trim()); setPickingAvatar(null); setCustomEmoji(""); }}}
                        style={{padding:"8px 14px",fontSize:13,fontWeight:600,borderRadius:"var(--radius)",border:"none",background:"#1D9E75",color:"#fff"}}>
                        Set
                      </button>
                    </div>
                    {/* Photo upload */}
                    <div style={{fontSize:11,color:"var(--text3)",marginBottom:7,fontWeight:500}}>Or use a photo</div>
                    <label style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:"var(--radius)",border:"1.5px dashed var(--border2)",background:"var(--bg)",cursor:"pointer"}}>
                      <span style={{fontSize:20}}>📷</span>
                      <span style={{fontSize:13,color:"var(--text2)"}}>Choose from camera roll or take photo</span>
                      <input type="file" accept="image/*" capture="user"
                        onChange={e=>handlePhotoUpload(p,e)}
                        style={{display:"none"}} />
                    </label>
                  </div>
                )}
              </div>
            );
          })}

          {/* Create new profile */}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <input value={newName} onChange={e=>setNewName(e.target.value)}
              placeholder="New profile name..."
              onKeyDown={e=>{ if(e.key==="Enter"&&newName.trim()){ onAdd(newName.trim()); setNewName(""); }}}
              style={{flex:1,fontSize:14,padding:"10px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border2)",background:"var(--bg2)",color:"var(--text)"}} />
            <button onClick={()=>{ if(newName.trim()){ onAdd(newName.trim()); setNewName(""); } }}
              style={{padding:"10px 16px",fontSize:14,fontWeight:600,borderRadius:"var(--radius)",border:"none",background:"#1D9E75",color:"#fff"}}>
              Create
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function LogView({entries, phases, sel, setSel, saveEntries, profile}){
  const [editing,setEditing]=useState(false);
  const phase=getPhase(sel,phases[0]);
  const workout=getWorkout(phase,sel);
  const entry=entries[sel]||{};
  const col=phase?COLORS[phase.c]:null;
  const isToday=sel===todayKey();

  function upEntry(f,v){ saveEntries(s=>({...s,[sel]:{...entry,[f]:v}})); }
  function upSets(exIdx, sets){
    const exData = entry.sets || {};
    saveEntries(s=>({...s,[sel]:{...entry,sets:{...exData,[exIdx]:sets}}}));
  }
  function saveEdit(newDay){
    const next=phases[0].map((p,pi)=>{
      const phIdx=phases[0].findIndex(ph=>ph.id===phase.id);
      if(pi!==phIdx)return p;
      return {...p,days:p.days.map(d=>d.day===workout.day?newDay:d)};
    });
    phases[1](next); setEditing(false);
  }

  const navBtn=(dir)=>{
    const next=addDays(sel,dir);
    const disabled=(dir===-1&&sel==="2026-03-23")||(dir===1&&sel==="2027-01-25");
    return (
      <button onClick={()=>setSel(next)} disabled={disabled}
        style={{width:40,height:40,borderRadius:"50%",border:"1px solid var(--border2)",background:"var(--bg2)",color:disabled?"var(--text3)":"var(--text)",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {dir===-1?"<":">"}
      </button>
    );
  };

  return (
    <div style={{paddingBottom:16}}>
      {editing&&phase&&workout&&<EditModal phase={phase} workout={workout} onClose={()=>setEditing(false)} onSave={saveEdit} />}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        {navBtn(-1)}
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:600,color:"var(--text)"}}>{fmtFull(pDate(sel))}</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:3,flexWrap:"wrap"}}>
            {phase&&<span style={{fontSize:12,padding:"3px 10px",borderRadius:20,background:col.l,color:col.t,fontWeight:500}}>Week {getWeek(sel)}</span>}
            {isToday&&<span style={{fontSize:12,padding:"3px 10px",borderRadius:20,background:"var(--bg2)",color:"var(--text2)",fontWeight:500}}>Today</span>}
            <input type="date" value={sel} min="2026-03-23" max="2027-01-25" onChange={e=>setSel(e.target.value)}
              style={{fontSize:11,padding:"3px 6px",borderRadius:6,border:"1px solid var(--border)",background:"transparent",color:"var(--text3)",width:110}} />
          </div>
        </div>
        {navBtn(1)}
      </div>

      {!phase&&<div style={{padding:"2rem",background:"var(--bg2)",borderRadius:"var(--radius-lg)",color:"var(--text2)",fontSize:14,textAlign:"center"}}>Outside program dates.</div>}

      {phase&&workout&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:col.main,borderRadius:"var(--radius-lg)",padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div>
                <div style={{fontSize:20,fontWeight:700,color:"#fff"}}>{workout.icon} {workout.label}</div>
                <div style={{fontSize:13,color:"rgba(255,255,255,0.75)",marginTop:2}}>{phase.name}</div>
              </div>
              <button onClick={()=>setEditing(true)} style={{padding:"7px 14px",fontSize:12,fontWeight:600,borderRadius:8,border:"1.5px solid rgba(255,255,255,0.45)",background:"rgba(255,255,255,0.15)",color:"#fff"}}>Edit</button>
            </div>
            <IntensityBadge intensity={workout.intensity} />
          </div>

          {workout.exercises.length>0&&(
            <Card>
              <CardHeader label="Exercises" bg={col.l} borderColor={col.a} textColor={col.t} />
              {workout.exercises.map((ex,i)=>{
                const isRun=/jog|run|row|pace|min|km|warm|cool|walk|ski/.test(ex.toLowerCase());
                return (
                  <SetTracker key={i} ex={ex} i={i}
                    setData={(entry.sets||{})[i]}
                    isRun={isRun} phase={phase}
                    onChange={(sets)=>upSets(i,sets)} />
                );
              })}
            </Card>
          )}

          {workout.exercises.length===0&&(
            <Card style={{padding:"24px",textAlign:"center"}}>
              <div style={{fontSize:32,marginBottom:8}}>😴</div>
              <div style={{fontSize:15,fontWeight:600,color:"var(--text)"}}>Rest day</div>
              <div style={{fontSize:13,color:"var(--text2)",marginTop:4}}>Recovery is part of the program.</div>
            </Card>
          )}

          <Card>
            <CardHeader label="Knee status" bg="var(--red-l)" borderColor="var(--red-a)" textColor="var(--red-t)" />
            <div style={{padding:"12px 16px",display:"flex",gap:8,flexWrap:"wrap"}}>
              {PAIN_LABELS.map((lvl,i)=>(
                <button key={lvl} onClick={()=>upEntry("pain",lvl)} style={{padding:"8px 16px",fontSize:13,borderRadius:20,border:entry.pain===lvl?`2px solid ${PAIN_MAIN[i]}`:"1px solid var(--border)",background:entry.pain===lvl?PAIN_BG[i]:"transparent",color:entry.pain===lvl?PAIN_TEXT[i]:"var(--text2)",fontWeight:entry.pain===lvl?600:400}}>{lvl}</button>
              ))}
            </div>
          </Card>

          <Card>
            <CardHeader label="Notes" />
            <div style={{padding:"10px 16px"}}>
              <textarea value={entry.notes||""} onChange={e=>upEntry("notes",e.target.value)} placeholder="How did it feel? Any wins? Knee okay?" rows={3}
                style={{width:"100%",fontSize:14,padding:"9px",borderRadius:"var(--radius)",border:`1px solid ${col.a}`,background:col.l,color:"var(--text)",resize:"vertical",lineHeight:1.6}} />
            </div>
          </Card>

          <Card>
            <CardHeader label={`Effort (RPE): ${entry.rpe||"?"}/10`} bg={col.l} borderColor={col.a} textColor={col.t} />
            <div style={{padding:"12px 16px 16px"}}>
              <input type="range" min={1} max={10} step={1} value={entry.rpe||5} onChange={e=>upEntry("rpe",+e.target.value)} style={{width:"100%",accentColor:col.main}} />
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text3)",marginTop:4}}>
                <span>Easy</span><span>Moderate</span><span>Max</span>
              </div>
            </div>
          </Card>

          <button onClick={()=>upEntry("completed",!entry.completed)} style={{width:"100%",padding:"15px",fontSize:16,fontWeight:700,borderRadius:"var(--radius-lg)",border:entry.completed?`2px solid ${col.main}`:"1.5px solid var(--border2)",background:entry.completed?col.main:"var(--bg2)",color:entry.completed?"#fff":"var(--text)",transition:"all 0.2s"}}>
            {entry.completed?`Logged - ${workout.label}`:"Mark as complete"}
          </button>
        </div>
      )}
    </div>
  );
}

function OverviewView({entries,phases,setSel,setView}){
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {phases.map(p=>{
        const col=COLORS[p.c];
        const days=[];
        const cur=new Date(pDate(p.start));
        const end=pDate(p.end);
        while(cur<=end){ days.push(dKey(cur)); cur.setDate(cur.getDate()+1); }
        const trainDays=days.filter(d=>{ const w=getWorkout(p,d); return w&&w.exercises.length>0; });
        const done=trainDays.filter(d=>entries[d]&&entries[d].completed).length;
        const pct=trainDays.length>0?Math.round((done/trainDays.length)*100):0;
        return (
          <Card key={p.id}>
            <div style={{background:`linear-gradient(90deg,${col.main}15,${col.l})`,padding:"12px 16px",borderBottom:`1px solid ${col.a}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:col.t}}>{p.name}</div>
                <div style={{fontSize:12,color:col.main,marginTop:1}}>{p.weeks} · {fmtShort(pDate(p.start))} - {fmtShort(pDate(p.end))}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:20,fontWeight:700,color:col.main}}>{pct}%</div>
                <div style={{fontSize:11,color:"var(--text3)"}}>{done}/{trainDays.length}</div>
              </div>
            </div>
            <div style={{padding:"12px 16px"}}>
              <div style={{background:"var(--bg2)",borderRadius:4,height:5,overflow:"hidden",marginBottom:10}}>
                <div style={{width:`${pct}%`,height:"100%",background:col.main,borderRadius:4,transition:"width 0.4s"}}></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
                {days.slice(0,49).map(d=>{
                  const w=getWorkout(p,d);
                  const isRest=!w||w.exercises.length===0;
                  const isDone=entries[d]&&entries[d].completed;
                  const pain=entries[d]?entries[d].pain:null;
                  const hasPain=pain&&pain!=="None";
                  const pi=PAIN_LABELS.indexOf(pain);
                  return <div key={d} onClick={()=>{ setSel(d); setView("log"); }} style={{height:13,borderRadius:3,cursor:"pointer",background:isDone?col.main:isRest?"transparent":"var(--bg2)",border:hasPain?`2px solid ${PAIN_MAIN[pi]}`:isRest?"1px dashed var(--border)":`1px solid ${col.a}`,opacity:isRest?0.3:1}} />;
                })}
              </div>
            </div>
          </Card>
        );
      })}
      <div style={{fontSize:12,color:"var(--text3)",textAlign:"center",paddingTop:4}}>Tap any square to open that day</div>
    </div>
  );
}

function ProgressView({entries,phases,setSel,setView}){
  const completed=Object.keys(entries).filter(k=>entries[k].completed).length;
  const painFlags=Object.values(entries).filter(e=>e.pain&&e.pain!=="None").length;
  const weeks=Math.ceil(completed/5);
  const painDays=Object.keys(entries).filter(d=>entries[d].pain&&entries[d].pain!=="None").sort();
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:10}}>
        {[{label:"Days logged",value:completed,c:"teal"},{label:"Weeks active",value:weeks,c:"blue"},{label:"Pain flags",value:painFlags,c:"pink"}].map(s=>{
          const col=COLORS[s.c];
          return <div key={s.label} style={{background:col.l,borderRadius:"var(--radius-lg)",padding:"14px 10px",textAlign:"center",border:`1px solid ${col.a}`}}><div style={{fontSize:26,fontWeight:700,color:col.main}}>{s.value}</div><div style={{fontSize:11,color:col.t,marginTop:3,lineHeight:1.3}}>{s.label}</div></div>;
        })}
      </div>
      <Card>
        <CardHeader label="Knee pain log" bg="var(--red-l)" borderColor="var(--red-a)" textColor="var(--red-t)" />
        <div style={{padding:"8px 0"}}>
          {painDays.length===0
            ? <div style={{padding:"12px 16px",fontSize:13,color:"var(--text2)"}}>No pain flagged - keep it that way.</div>
            : painDays.map(d=>{
                const pi=PAIN_LABELS.indexOf(entries[d].pain);
                return (
                  <div key={d} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 16px",borderBottom:"0.5px solid var(--border)",cursor:"pointer"}} onClick={()=>{ setSel(d); setView("log"); }}>
                    <span style={{fontSize:12,color:"var(--text2)",minWidth:80}}>{fmtShort(pDate(d))}</span>
                    <span style={{fontSize:12,padding:"3px 10px",borderRadius:20,background:PAIN_BG[pi],color:PAIN_TEXT[pi],fontWeight:600}}>{entries[d].pain}</span>
                    {entries[d].notes&&<span style={{fontSize:12,color:"var(--text2)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entries[d].notes}</span>}
                  </div>
                );
              })
          }
        </div>
      </Card>
      <Card>
        <CardHeader label="Recent sessions" />
        <div style={{padding:"4px 0"}}>
          {Object.keys(entries).filter(d=>entries[d].completed).sort().reverse().slice(0,20).length===0
            ? <div style={{padding:"12px 16px",fontSize:13,color:"var(--text2)"}}>No completed sessions yet.</div>
            : Object.keys(entries).filter(d=>entries[d].completed).sort().reverse().slice(0,20).map(d=>{
                const ph=getPhase(d,phases);
                const w=getWorkout(ph,d);
                const col=ph?COLORS[ph.c]:null;
                const rpe=entries[d].rpe;
                const pi=PAIN_LABELS.indexOf(entries[d].pain);
                // Summarize sets
                const sets=entries[d].sets||{};
                const metrics=Object.values(sets).flatMap(ex=>(ex||[]).map(s=>[s.weight&&`${s.weight}`,s.reps&&`${s.reps}`,s.time&&`${s.time}`,s.distance&&`${s.distance}`].filter(Boolean).join("x")).filter(Boolean)).slice(0,4);
                return (
                  <div key={d} style={{padding:"11px 16px",borderBottom:"0.5px solid var(--border)",cursor:"pointer"}} onClick={()=>{ setSel(d); setView("log"); }}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{fmtFull(pDate(d))}</span>
                      {col&&w&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:col.l,color:col.t,border:`1px solid ${col.a}`}}>{w.label}</span>}
                      {w&&w.intensity&&<span style={{fontSize:11}}>{INTENSITY[w.intensity].dot}</span>}
                      {rpe&&<span style={{fontSize:11,color:"var(--text3)"}}>RPE {rpe}</span>}
                      {entries[d].pain&&entries[d].pain!=="None"&&<span style={{fontSize:11,color:PAIN_MAIN[pi]}}>{entries[d].pain} pain</span>}
                    </div>
                    {metrics.length>0&&<div style={{fontSize:12,color:"var(--text2)"}}>{metrics.join(" · ")}</div>}
                    {entries[d].notes&&<div style={{fontSize:12,color:"var(--text3)",fontStyle:"italic",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entries[d].notes}</div>}
                  </div>
                );
              })
          }
        </div>
      </Card>
      <Card>
        <CardHeader label="Intensity guide" />
        <div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:10}}>
          {Object.entries(INTENSITY).map(([k,v])=>(
            <div key={k} style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:16}}>{v.dot}</span>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{v.label} <span style={{fontWeight:400,color:"var(--text2)"}}>· {v.sub}</span></div>
                <div style={{fontSize:11,color:"var(--text3)"}}>
                  {k==="green"?"Feel fresh after, can hold conversation":k==="yellow"?"Breathing elevated, fatigue controlled":"Near limit, used sparingly"}
                </div>
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

function App(){
  // Profile management
  const [profiles, setProfiles] = useState(()=>loadLS("hyrox_profiles", ["LJ"]));
  const [profile, setProfile] = useState(()=>loadLS("hyrox_active_profile", "LJ"));
  const [profileAvatars, setProfileAvatars] = useState(()=>loadLS("hyrox_profile_avatars", {}));
  const [showProfiles, setShowProfiles] = useState(false);

  // Per-profile data
  const [entries, setEntriesRaw] = useState(()=>loadLS(sk(profile,"entries"), {}));
  const [phases, setPhasesRaw] = useState(()=>loadLS(sk(profile,"phases"), DEFAULT_PHASES));
  const [sel, setSel] = useState(()=>clamp(todayKey()));
  const [view, setView] = useState("log");

  // When profile changes, reload data
  useEffect(()=>{
    setEntriesRaw(loadLS(sk(profile,"entries"),{}));
    setPhasesRaw(loadLS(sk(profile,"phases"),DEFAULT_PHASES));
    saveLS("hyrox_active_profile", profile);
  }, [profile]);

  function setEntries(updater){
    setEntriesRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      saveLS(sk(profile,"entries"),next);
      return next;
    });
  }
  function setPhases(next){ setPhasesRaw(next); saveLS(sk(profile,"phases"),next); }

  function addProfile(name){
    const next=[...profiles, name];
    setProfiles(next);
    saveLS("hyrox_profiles",next);
    setProfile(name);
  }

  function renameProfile(oldName, newName){
    if(profiles.includes(newName)) return; // already exists
    const next = profiles.map(p=>p===oldName?newName:p);
    setProfiles(next); saveLS("hyrox_profiles",next);
    // migrate data
    const oldEntries = loadLS(sk(oldName,"entries"),{});
    const oldPhases = loadLS(sk(oldName,"phases"),DEFAULT_PHASES);
    saveLS(sk(newName,"entries"), oldEntries);
    saveLS(sk(newName,"phases"), oldPhases);
    // migrate emoji
    const nextAvatars = {...profileAvatars};
    if(nextAvatars[oldName]){ nextAvatars[newName]=nextAvatars[oldName]; delete nextAvatars[oldName]; }
    setProfileAvatars(nextAvatars); saveLS("hyrox_profile_avatars", nextAvatars);
    if(profile===oldName){ setProfile(newName); saveLS("hyrox_active_profile",newName); }
  }

  function changeAvatar(p, avatar){
    const next = {...profileAvatars, [p]: avatar};
    setProfileAvatars(next); saveLS("hyrox_profile_avatars", next);
  }

  const phase=getPhase(sel,phases);
  const col=phase?COLORS[phase.c]:null;
  const completed=Object.keys(entries).filter(k=>entries[k].completed).length;

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"var(--bg)"}}>
      {showProfiles&&<ProfileModal profiles={profiles} current={profile} profileAvatars={profileAvatars} onSelect={setProfile} onAdd={addProfile} onRename={renameProfile} onChangeAvatar={changeAvatar} onClose={()=>setShowProfiles(false)} />}

      <div className="safe-top" style={{background:col?col.main:"#1D9E75"}}>
        <div style={{padding:"12px 16px 0"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(255,255,255,0.7)"}}>Hyrox Training Journal</div>
              <div style={{fontSize:20,fontWeight:700,color:"#fff",marginTop:2,lineHeight:1.2}}>{phase?phase.name:"Program Complete"}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.7)",marginTop:2}}>{phase?phase.weeks+" · ":""} Mar 23 26 to Spring 27</div>
            </div>
            <div style={{textAlign:"right",paddingTop:2,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
              {/* Profile switcher */}
              <button onClick={()=>setShowProfiles(true)} style={{padding:"4px 6px 4px 4px",borderRadius:20,border:"1.5px solid rgba(255,255,255,0.45)",background:"rgba(255,255,255,0.15)",color:"#fff",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                <AvatarDisplay avatar={profileAvatars[profile]||"👤"} size={24} />
                {profile}
              </button>
              <div style={{fontSize:26,fontWeight:700,color:"#fff"}}>{completed}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.65)"}}>days logged</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,marginTop:12,flexWrap:"wrap",paddingBottom:12}}>
            {phases.map(p=>(
              <button key={p.id} onClick={()=>{ setSel(p.start); setView("log"); }}
                style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:600,border:"none",cursor:"pointer",background:phase&&phase.id===p.id?"rgba(255,255,255,0.28)":"rgba(255,255,255,0.12)",color:"#fff",outline:phase&&phase.id===p.id?"2px solid rgba(255,255,255,0.5)":"none",outlineOffset:1}}>
                {p.short}
              </button>
            ))}
          </div>
          <div style={{background:"rgba(0,0,0,0.2)",height:4,marginLeft:-16,marginRight:-16}}>
            <div style={{width:`${Math.min(100,(completed/264)*100).toFixed(1)}%`,height:"100%",background:"rgba(255,255,255,0.7)",transition:"width 0.4s"}}></div>
          </div>
        </div>
        <div style={{background:"var(--bg)",padding:"10px 16px 0"}}>
          <div style={{display:"flex",gap:0,background:"var(--bg2)",borderRadius:"var(--radius-lg)",padding:3}}>
            {["log","overview","progress"].map(v=>(
              <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"8px 0",fontSize:13,borderRadius:"var(--radius)",border:"none",background:view===v?"var(--bg)":"transparent",color:view===v?(col?col.main:"var(--text)"):"var(--text2)",fontWeight:view===v?600:400,boxShadow:view===v?"0 1px 4px rgba(0,0,0,0.10)":"none",transition:"all 0.15s"}}>
                {v.charAt(0).toUpperCase()+v.slice(1)}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"14px 16px",paddingBottom:"calc(16px + var(--safe-bottom))"}}>
        {view==="log"&&<LogView entries={entries} phases={[phases,setPhases]} sel={sel} setSel={setSel} saveEntries={setEntries} profile={profile} />}
        {view==="overview"&&<OverviewView entries={entries} phases={phases} setSel={setSel} setView={setView} />}
        {view==="progress"&&<ProgressView entries={entries} phases={phases} setSel={setSel} setView={setView} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); });
    }
  </script>
</body>
</html>
